<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

.container{max-width:900px;margin:auto;padding:10px;}

.box{position:absolute;cursor:pointer;z-index:99;}
.box.active{border:2px solid red;background:rgba(255,0,0,0.2);}
.info{background:#fff;padding:15px;margin-top:10px;border-left:5px solid red;display:none;}
.info h3{margin:0 0 5px 0;color:red;}
.info p{margin:0;font-size:16px;line-height:1.5;}
</style>
</head>
<body>

<div class="container">

    </div>

        <div class="box" style="top:4%;left:54%;width:28%;height:5%;" onclick="show(this,'৪. মডেল কোড ও গ্রেড','গাড়ির বডি কোড ও চ্যাসিস টাইপ।')"></div>
        <div class="box" style="top:4%;left:83%;width:13%;height:7%;" onclick="show(this,'৫. অকশন গ্রেড','গাড়ির সামগ্রিক কন্ডিশন। ৪.৫ বা ৫ মানে ফ্রেশ।')"></div>

        <div class="box" style="top:9%;left:89%;width:6%;height:4%;" onclick="show(this,'১০. এক্সটেরিয়র গ্রেড','বাইরের বডির কন্ডিশন গ্রেড।')"></div>
        <div class="box" style="top:21%;left:3%;width:40%;height:4%;" onclick="show(this,'১১. মাইলেজ','গাড়িটি জাপানে মোট কত কিমি চলেছে।')"></div>

        <div class="box" style="top:25%;left:3%;width:25%;height:4%;" onclick="show(this,'১৪. গাড়ির রঙ','বাইরের বডির অরিজিনাল রঙ।')"></div>
        <div class="box" style="top:25%;left:29%;width:14%;height:4%;" onclick="show(this,'১৫. কালার কোড','রঙের নির্দিষ্ট কোড নম্বর।')"></div>
        <div class="box" style="top:25%;left:43%;width:20%;height:4%;" onclick="show(this,'১৬. এসি','গাড়ির এয়ার কন্ডিশনিং সিস্টেমের অবস্থা।')"></div>

        <div class="box" style="top:30%;left:3%;width:25%;height:4%;" onclick="show(this,'১৮. ফুয়েল','পেট্রোল, হাইব্রিড নাকি ডিজেল ইঞ্জিন।')"></div>
        <div class="box" style="top:30%;left:29%;width:14%;height:4%;" onclick="show(this,'১৯. ইন্টেরিয়র কালার','ভেতরের সিট ও ড্যাশবোর্ডের রঙ।')"></div>
        <div class="box" style="top:41%;left:3%;width:48%;height:15%;" onclick="show(this,'২০. পরিদর্শকের মন্তব্য','ইন্সপেক্টরের বিশেষ মন্তব্য ও সতর্কতা।')"></div>
        <div class="box" style="top:46%;left:51%;width:45%;height:39%;" onclick="show(this,'২১. বডি ম্যাপ','স্ক্র্যাচ, ডেন্ট ও রিপেয়ার মার্ক করা ম্যাপ।')"></div>

        <div class="box" style="top:15%;left:3%;width:48%;height:5%;" onclick="show(this,'Inspector Notes','The most important part is this one writing only by inspector. Here could be found short information about mechanic, electric, exterior and interior condition etc.')"></div>
    </div>

    <div class="info" id="info">
        <h3 id="t"></h3>
        <p id="d"></p>
    </div>
</div>

<script>
function show(el,t,d){
    document.querySelectorAll('.box').forEach(b=>b.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('t').innerText = t;
    document.getElementById('d').innerText = d;
    document.getElementById('info').style.display = 'block';
    document.getElementById('info').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}
</script>

</body>
</html>
