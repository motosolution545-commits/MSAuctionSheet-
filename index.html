<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body{margin:0;font-family:Arial, sans-serif;background:#f4f4f4;}
.container{max-width:900px;margin:auto;padding:10px;}

/*  STYLISH HEADER DESIGN  */
.header{
    background:#fff;
    padding:20px;
    text-align:center;
    border-top:5px solid #d32f2f;
    border-radius:10px;
    margin-bottom:15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.06);
}

.brand-logo {
    max-height: 80px;
    margin-bottom: 15px;
}

.header h2 { 
    color: #d32f2f; 
    margin: 0 0 15px 0; 
    font-size: 28px; 
    text-transform: uppercase; 
    letter-spacing: 1px;
    font-weight: 900;
}

.contact-info { 
    background: #fdfdfd;
    border: 1px solid #eee;
    border-radius: 8px;
    padding: 15px;
    margin: 0 auto 20px auto;
    max-width: 650px;
    color: #444; 
    line-height: 1.8; 
    font-size: 15px;
}

.contact-info .name {
    font-size: 18px;
    font-weight: bold;
    color: #222;
    margin-bottom: 8px;
    border-bottom: 1px dashed #ccc;
    padding-bottom: 8px;
    display: inline-block;
}

.contact-info i {
    color: #d32f2f;
    margin-right: 5px;
    width: 20px;
    text-align: center;
}

.social-links {
    display: flex;
    justify-content: center;
    gap: 15px;
    flex-wrap: wrap;
}

.social-links a { 
    text-decoration: none; 
    padding: 10px 20px; 
    border-radius: 30px; 
    font-size: 14px; 
    font-weight: bold; 
    transition: 0.3s;
    display: flex;
    align-items: center;
    gap: 8px;
}

/* Social Media Button Colors */
.link-web { background: #e3f2fd; color: #1565c0; border: 1px solid #bbdefb; }
.link-fb { background: #e8eaf6; color: #283593; border: 1px solid #c5cae9; }
.link-ig { background: #fce4ec; color: #c2185b; border: 1px solid #f8bbd0; }

.social-links a:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    filter: brightness(0.95);
}

/* AUCTION SHEET STYLES */
.auction{
position:relative;
}

.auction img{
width:100%;
display:block;
}

/*  FIXED CLICKABLE BOX ( ) */
.box{
position:absolute;
cursor:pointer;
z-index:999; 
}

/* highlight */
.box.active{
border:2px solid red;
background:rgba(255,0,0,0.2);
}

.box:hover{
background:rgba(255,0,0,0.15);
}

.info{
background:#fff;
padding:15px;
margin-top:10px;
border-left:5px solid red;
display:none;
}
</style>

</head>

<script>
function show(el,t,d){

}
